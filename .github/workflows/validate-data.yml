name: Validate M7 data

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/validate-data.yml'
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/validate-data.yml'
  workflow_dispatch:

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate dashboard data
        run: npm run validate
